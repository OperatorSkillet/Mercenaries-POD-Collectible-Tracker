        <script>
            function switchMap(which, fromAct = false) {
                const south = document.getElementById('map-container-south');
                const north = document.getElementById('map-container-north');
                const btnSouth = document.getElementById('btn-south');
                const btnNorth = document.getElementById('btn-north');

                if (which === 'south') {
                    south.classList.add('active');
                    north.classList.remove('active');
                    btnSouth.classList.add('active');
                    btnNorth.classList.remove('active');
                } else {
                    north.classList.add('active');
                    south.classList.remove('active');
                    btnNorth.classList.add('active');
                    btnSouth.classList.remove('active');
                }
                window.dispatchEvent(new Event('resize'));
                if (window.updateTracker) window.updateTracker();

                // Activate the first act button for the selected map
                if (!fromAct) {
                    const defaultAct = which === 'south' ? 'one' : 'three';
                    document.querySelectorAll('.act-btn').forEach(btn => btn.classList.remove('active'));
                    document.querySelector(`[data-map="${which}"][data-act="${defaultAct}"]`).classList.add('active');
                    window._activeAct[which] = defaultAct;
                }

                if (window.applyActFilter) window.applyActFilter();
            }

            function switchAct(map, act) {
                // Deactivate all act buttons across both maps, then activate the one clicked
                document.querySelectorAll('.act-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[data-map="${map}"][data-act="${act}"]`).classList.add('active');

                // Store current act per map
                window._activeAct = window._activeAct || {};
                window._activeAct[map] = act;

                switchMap(map, true);
                if (window.applyActFilter) window.applyActFilter();
            }

            // Initialize default acts — only Act 1 active at startup
            window._activeAct = { south: 'one', north: 'three' };
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('.act-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('[data-map="south"][data-act="one"]').classList.add('active');
            });

            window._hvtsVisible = true;
            function toggleHVTs() {
                window._hvtsVisible = !window._hvtsVisible;
                document.getElementById('hvt-toggle-label').textContent = window._hvtsVisible ? 'ON' : 'OFF';
                document.getElementById('hvt-toggle-btn').classList.toggle('hidden-category', !window._hvtsVisible);
                if (window.applyActFilter) window.applyActFilter();
            }
        </script>
